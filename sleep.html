<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>人生RPG｜睡眠</title>

<link rel="stylesheet" href="style.css?v=004">

</head>

<body>

<div class="container">

<header class="hero">

<div class="logo">😴</div>

<h1>睡眠</h1>

<p class="slogan">

好的睡眠，

是每天最好的充電。

</p>

</header>

<section class="profile-card">

<div class="profile-avatar">

👤

</div>

<div class="profile-info">

<h2 id="nickname">載入中...</h2>

<p class="level-title">

昨晚睡眠

</p>

<h3 id="sleepHour">

0 小時

</h3>

</div>

</section>

<section class="task-panel">

<div class="section-title">

<h2>睡眠紀錄</h2>

</div>

<div class="task-input">

<input
type="number"
id="sleepInput"
placeholder="睡了幾小時？"
step="0.5">

</div>

<div class="task-input">

<button id="saveSleep">

儲存

</button>

</div>

</section>

<section class="task-panel">

<div class="section-title">

<h2>睡眠品質</h2>

</div>

<div class="card-grid">

<div class="card" id="goodSleep">

😊

<br><br>

很好

</div>

<div class="card" id="normalSleep">

🙂

<br><br>

普通

</div>

<div class="card" id="badSleep">

😫

<br><br>

不好

</div>

</div>

</section>

<div style="text-align:center;margin-top:40px;">

<button onclick="location.href='health.html'">

← 返回健康世界

</button>

</div>

</div>

<script src="sleep.js?v=004"></script>

</body>

</html>
