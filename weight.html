<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生RPG｜體重</title>

    <link rel="stylesheet" href="style.css?v=004">

</head>

<body>

<div class="container">

    <header class="hero">

        <div class="logo">⚖️</div>

        <h1>體重紀錄</h1>

        <p class="slogan">

            每一次紀錄，<br>

            都是在看見自己的改變。

        </p>

    </header>

    <section class="profile-card">

        <div class="profile-avatar">

            👤

        </div>

        <div class="profile-info">

            <h2 id="nickname">

                載入中...

            </h2>

            <p class="level-title">

                人生 Level

            </p>

            <h3 id="life-level">

                Lv.1

            </h3>

        </div>

    </section>

    <section class="task-panel">

        <div class="section-title">

            <h2>新增體重</h2>

        </div>

        <div class="task-input">

            <input
                type="number"
                id="weightInput"
                placeholder="請輸入體重 (kg)"
                step="0.1">

        </div>

        <div class="task-input">

            <button id="saveWeight">

                儲存體重

            </button>

        </div>

    </section>

    <section class="task-panel">

        <div class="section-title">

            <h2>體重紀錄</h2>

        </div>

        <ul id="weightList">

        </ul>

    </section>

    <div style="text-align:center;margin-top:40px;">

        <button onclick="location.href='health.html'">

            ← 返回健康世界

        </button>

    </div>

</div>

<script src="weight.js?v=004"></script>

</body>

</html>
