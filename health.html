
<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生RPG｜健康世界</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <header class="hero">

        <div class="logo">💪</div>

        <h1>健康世界</h1>

        <p class="slogan">

            今天照顧自己的身體，<br>

            就是對未來最好的投資。

        </p>

    </header>

    <section class="profile-card">

        <div class="profile-avatar">
            👤
        </div>

        <div class="profile-info">

            <h2 id="nickname">
                載入中...
            </h2>

            <p class="level-title">
                人生 Level
            </p>

            <h3 id="life-level">
                Lv.1
            </h3>

        </div>

    </section>

    <section class="world-section">

        <div class="section-title">

            <h2>今天想完成什麼？</h2>

        </div>

        <div class="card-grid">

            <div class="card">

                <div class="icon">🏋️</div>

                <h3>運動</h3>

                <p>開始今天的訓練。</p>

            </div>

            <div class="card">

                <div class="icon">⚖️</div>

                <h3>體重</h3>

                <p>記錄目前體重。</p>

            </div>

            <div class="card">

                <div class="icon">💧</div>

                <h3>喝水</h3>

                <p>今天喝了多少水？</p>

            </div>

            <div class="card">

                <div class="icon">😴</div>

                <h3>睡眠</h3>

                <p>記錄睡眠品質。</p>

            </div>

            <div class="card">

                <div class="icon">📏</div>

                <h3>BMI</h3>

                <p>計算身體指數。</p>

            </div>

        </div>

    </section>

    <div style="text-align:center;margin-top:50px;">

        <button onclick="location.href='index.html'" id="backButton">

            ← 返回首頁

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
