<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生RPG</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="hero">

<div class="logo">

🎮

</div>

<h1>人生RPG</h1>

<p class="subtitle">

Every Day is a New Quest

</p>

</header>

<section class="player-card">

<div class="avatar">

👤

</div>

<div class="player-info">

<h2>玩家 Lv.1</h2>

<p>今天也是新的冒險。</p>

<div class="exp-bar">

<div class="exp-fill"></div>

</div>

<small>EXP 15 / 100</small>

</div>

</section>

<section class="world-title">

<h2>選擇你的世界</h2>

<p>完成每天的小任務，讓人生慢慢升級。</p>

</section>

<section class="card-grid">

<div class="card investment">

<div class="icon">💰</div>

<h3>投資有富</h3>

<p>打造自己的現金流。</p>

</div>

<div class="card food">

<div class="icon">🍜</div>

<h3>百匯饗宴</h3>

<p>今天吃什麼？</p>

</div>

<div class="card meme">

<div class="icon">😂</div>

<h3>人生迷因</h3>

<p>每天笑一下。</p>

</div>

<div class="card fitness">

<div class="icon">💪</div>

<h3>獨自升級</h3>

<p>每天比昨天更強。</p>

</div>

<div class="card map">

<div class="icon">🗺️</div>

<h3>地圖解鎖</h3>

<p>探索新的地方。</p>

</div>

</section>

<footer>

<p>

人生RPG v2.0

</p>

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
