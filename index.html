<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>人生RPG</title>

    <link rel="stylesheet"
          href="style.css?v=005">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- Hero -->
    <!-- ========================= -->

    <header class="hero">

        <div class="logo">

            🌍

        </div>

        <h1>

            人生RPG

        </h1>

        <p class="slogan">

            人生，不需要打怪。<br>

            而是超越昨天的自己。

        </p>

    </header>

    <!-- ========================= -->
    <!-- 玩家資訊 -->
    <!-- ========================= -->

    <section class="profile-card">

        <div class="profile-avatar">

            👤

        </div>

        <div class="profile-info">

            <h2 id="nickname">

                努力成長的大叔

            </h2>

            <p class="level-title">

                人生 Level

            </p>

            <h3 id="life-level">

                Lv.1

            </h3>

        </div>

    </section>

    <!-- ========================= -->
    <!-- 人生世界 -->
    <!-- ========================= -->

    <section class="world-section">

        <div class="section-title">

            <h2>

                人生世界

            </h2>

            <p>

                今天，想從哪一個世界開始？

            </p>

        </div>

        <div class="card-grid">            <!-- 💪 獨自升級 -->

            <div class="card"

                 onclick="location.href='health.html'">

                <div class="icon">

                    💪

                </div>

                <h3>

                    獨自升級

                </h3>

                <p>

                    每天比昨天更強一點

                </p>

            </div>

            <!-- 💰 投資有富 -->

            <div class="card"

                 onclick="location.href='wealth.html'">

                <div class="icon">

                    💰

                </div>

                <h3>

                    投資有富

                </h3>

                <p>

                    建立自己的現金流

                </p>

            </div>

            <!-- 🍽 百匯饗宴 -->

            <div class="card"

                 onclick="location.href='life.html'">

                <div class="icon">

                    🍽

                </div>

                <h3>

                    百匯饗宴

                </h3>

                <p>

                    好好吃飯，也好好生活

                </p>

            </div>

            <!-- 🧠 人生迷因 -->

            <div class="card"

                 onclick="location.href='growth.html'">

                <div class="icon">

                    🧠

                </div>

                <h3>

                    人生迷因

                </h3>

                <p>

                    每天學一點，持續成長

                </p>

            </div>

            <!-- 🗺 人生探索 -->

            <div class="card"

                 onclick="location.href='explore.html'">

                <div class="icon">

                    🗺

                </div>

                <h3>

                    人生探索

                </h3>

                <p>

                    去看看世界，也探索自己

                </p>

            </div>
                    </div>

    </section>

    <!-- ========================= -->
    <!-- 今日一句 -->
    <!-- ========================= -->

    <section class="today-message">

        <h2>

            今天，就是改變的開始。

        </h2>

        <p>

            人生，不需要打怪。<br>

            改變，就是當下。<br>

            讓自己變得更好，<br>

            才是人生真正的任務。

        </p>

    </section>

    <!-- ========================= -->
    <!-- Footer -->
    <!-- ========================= -->

    <footer>

        人生RPG v1.0 Alpha005

    </footer>

</div>

<!-- ========================= -->
<!-- Script -->
<!-- ========================= -->

<script>

const nickname =
localStorage.getItem("lifeNickname");

if(nickname){

    document.getElementById("nickname").innerText =
    nickname;

}

const level =
localStorage.getItem("lifeLevel");

if(level){

    document.getElementById("life-level").innerText =
    "Lv." + level;

}

</script>

<script src="script.js?v=005"></script>

</body>

</html>
