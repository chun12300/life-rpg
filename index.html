<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人生RPG</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header>

            <div class="logo">
                🎮
            </div>

            <h1>人生RPG</h1>

            <p>Every Day is a New Quest</p>

        </header>

        <section class="player">

            <div class="avatar">

                👤

            </div>

            <div>

                <h2>玩家 Lv.1</h2>

                <p>開始你的冒險</p>

            </div>

        </section>

        <section class="world">

            <h2>選擇世界</h2>

            <div class="cards">

                <div class="card">

                    💰

                    <h3>投資有富</h3>

                    <p>讓錢開始替你工作</p>

                </div>

                <div class="card">

                    🍜

                    <h3>百匯饗宴</h3>

                    <p>今天吃什麼？</p>

                </div>

                <div class="card">

                    😂

                    <h3>人生迷因</h3>

                    <p>今天笑一下</p>

                </div>

                <div class="card">

                    💪

                    <h3>獨自升級</h3>

                    <p>每天強一點</p>

                </div>

                <div class="card">

                    🗺️

                    <h3>地圖解鎖</h3>

                    <p>探索新的地方</p>

                </div>

            </div>

        </section>

    </div>

<script src="script.js"></script>

</body>

</html>
