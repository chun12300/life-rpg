<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>人生RPG｜運動</title>

    <link rel="stylesheet" href="style.css?v=004">

</head>

<body>

<div class="container">

    <header class="hero">

        <div class="logo">🏋️</div>

        <h1>運動</h1>

        <p class="slogan">

            今天的努力，<br>

            是未來身體給你的回報。

        </p>

    </header>

    <section class="profile-card">

        <div class="profile-avatar">

            👤

        </div>

        <div class="profile-info">

            <h2 id="nickname">

                載入中...

            </h2>

            <p class="level-title">

                人生 Level

            </p>

            <h3 id="life-level">

                Lv.1

            </h3>

        </div>

    </section>

    <section class="task-panel">

        <div class="section-title">

            <h2>新增運動紀錄</h2>

        </div>

        <div class="task-input">

            <input
                type="text"
                id="exerciseName"
                placeholder="例如：深蹲、跑步、肩部訓練">

        </div>

        <div class="task-input">

            <input
                type="number"
                id="exerciseMinute"
                placeholder="運動幾分鐘">

        </div>

        <div class="task-input">

            <button id="saveExercise">

                完成紀錄

            </button>

        </div>

    </section>

    <section class="task-panel">

        <div class="section-title">

            <h2>今日運動</h2>

        </div>

        <ul id="exerciseList">

        </ul>

    </section>

    <div style="text-align:center;margin-top:40px;">

        <button onclick="location.href='health.html'">

            ← 返回健康世界

        </button>

    </div>

</div>

<script src="exercise.js?v=004"></script>

</body>

</html>
